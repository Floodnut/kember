apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workerpools.kember.openflood.org
spec:
  group: kember.openflood.org
  names:
    kind: WorkerPool
    listKind: WorkerPoolList
    plural: workerpools
    shortNames:
      - wp
    singular: workerpool
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - execution
                - template
                - taskPolicy
              properties:
                execution:
                  type: object
                  required: [mode]
                  properties:
                    mode:
                      type: string
                      enum: [job, exec]
                    commandTemplate:
                      type: array
                      minItems: 1
                      items:
                        type: string
                        minLength: 1
                lifecycle:
                  type: object
                  required: [profile, maxTasksPerWorker]
                  properties:
                    profile:
                      type: string
                      enum: [runToCompletion, warmLease]
                    maxTasksPerWorker:
                      type: integer
                      format: int32
                      minimum: 1
                      maximum: 1
                capacity:
                  type: object
                  required: [policy, size]
                  properties:
                    policy:
                      type: string
                      enum: [fixed]
                    size:
                      type: integer
                      format: int32
                      minimum: 1
                template:
                  type: object
                  required:
                    - image
                    - command
                    - serviceAccountName
                    - inputPolicy
                    - resources
                  properties:
                    image:
                      type: string
                      pattern: '^.+@sha256:[a-f0-9]{64}$'
                    command:
                      type: array
                      minItems: 1
                      items:
                        type: string
                        minLength: 1
                    args:
                      type: array
                      items:
                        type: string
                    argsTemplate:
                      type: array
                      items:
                        type: string
                    serviceAccountName:
                      type: string
                      minLength: 1
                    inputPolicy:
                      type: object
                      required: [allowedPrefixes]
                      properties:
                        allowedPrefixes:
                          type: array
                          minItems: 1
                          items:
                            type: string
                            minLength: 1
                    allowedParameters:
                      type: object
                      additionalProperties:
                        type: object
                        required: [type]
                        properties:
                          type:
                            type: string
                            enum: [string]
                          enum:
                            type: array
                            items:
                              type: string
                    resources:
                      x-kubernetes-preserve-unknown-fields: true
                    securityContext:
                      x-kubernetes-preserve-unknown-fields: true
                    readinessProbe:
                      x-kubernetes-preserve-unknown-fields: true
                taskPolicy:
                  type: object
                  required: [queueTimeoutSeconds, timeoutSeconds, retentionSeconds]
                  properties:
                    queueTimeoutSeconds:
                      type: integer
                      format: int64
                      minimum: 1
                    timeoutSeconds:
                      type: integer
                      format: int64
                      minimum: 1
                    retentionSeconds:
                      type: integer
                      format: int32
                      minimum: 0
              x-kubernetes-validations:
                - rule: "self.execution.mode == 'job' ? !has(self.lifecycle) || self.lifecycle.profile == 'runToCompletion' : has(self.lifecycle) && self.lifecycle.profile == 'warmLease' && has(self.capacity) && has(self.execution.commandTemplate)"
                  message: job requires runToCompletion; exec requires warmLease, capacity, and commandTemplate
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                capacity:
                  type: object
                  required: [desired, starting, ready, leased, terminating]
                  properties:
                    desired:
                      type: integer
                      format: int32
                      minimum: 0
                    starting:
                      type: integer
                      format: int32
                      minimum: 0
                    ready:
                      type: integer
                      format: int32
                      minimum: 0
                    leased:
                      type: integer
                      format: int32
                      minimum: 0
                    terminating:
                      type: integer
                      format: int32
                      minimum: 0
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
                  items:
                    type: object
                    required: [lastTransitionTime, message, reason, status, type]
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      type:
                        type: string
