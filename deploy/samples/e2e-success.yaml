apiVersion: v1
kind: Namespace
metadata:
  name: kember-e2e
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: e2e-worker
  namespace: kember-e2e
---
apiVersion: kember.openflood.org/v1alpha1
kind: WorkerPool
metadata:
  name: echo
  namespace: kember-e2e
spec:
  execution:
    mode: job
  template:
    image: busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
    command: ["/bin/sh", "-c"]
    argsTemplate: ["echo kember-e2e"]
    serviceAccountName: e2e-worker
    inputPolicy:
      allowedPrefixes: ["s3://security-artifacts/project-a/"]
    resources:
      requests:
        cpu: "10m"
        memory: "16Mi"
      limits:
        cpu: "50m"
        memory: "32Mi"
  taskPolicy:
    queueTimeoutSeconds: 30
    timeoutSeconds: 60
    retentionSeconds: 60
---
apiVersion: kember.openflood.org/v1alpha1
kind: TaskRun
metadata:
  name: echo
  namespace: kember-e2e
spec:
  workerPoolRef:
    name: echo
  input:
    ref: s3://security-artifacts/project-a/source.tar.gz
  timeoutSeconds: 30
