apiVersion: v1
kind: ServiceAccount
metadata:
  name: kember-api
  namespace: kember-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kember-api-reader
  namespace: kember-system
rules:
  - apiGroups: ["kember.openflood.org"]
    resources: ["workerpools", "taskruns"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kember-api-reader
  namespace: kember-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kember-api-reader
subjects:
  - kind: ServiceAccount
    name: kember-api
    namespace: kember-system
