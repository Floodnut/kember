apiVersion: apps/v1
kind: Deployment
metadata:
  name: kember-api
  namespace: kember-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kember-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kember-api
    spec:
      serviceAccountName: kember-api
      containers:
        - name: api
          image: kember-api:e2e
          imagePullPolicy: IfNotPresent
          env:
            - name: KEMBER_NAMESPACE
              value: kember-system
            - name: KEMBER_API_PORT
              value: "8080"
            - name: KEMBER_UI_DIR
              value: /app/ui
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
---
apiVersion: v1
kind: Service
metadata:
  name: kember-api
  namespace: kember-system
spec:
  selector:
    app.kubernetes.io/name: kember-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
