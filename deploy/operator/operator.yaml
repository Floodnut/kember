apiVersion: apps/v1
kind: Deployment
metadata:
  name: kember-operator
  namespace: kember-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kember-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kember-operator
    spec:
      serviceAccountName: kember-operator
      containers:
        - name: operator
          image: kember-operator:e2e
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=:8080
            - --taskrun-controller-workers=8
            - --warm-exec-max-concurrency=4
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
