name: Validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Go unit tests
        run: go test ./apps/kember-operator/...
      - name: Benchmark timing unit tests
        run: python3 -m unittest discover -s tests/benchmark -p 'test_*.py'
      - name: Shell syntax checks
        run: bash -n tests/benchmark/checkov-warmlease.sh tests/benchmark/trivy-warmlease.sh tests/e2e/warm-status-clean-cluster.sh

  bazel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
      - name: Bazel operator tests
        run: bazel test //apps/kember-operator/...
